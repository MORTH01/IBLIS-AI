<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IBLIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --bg1: #040408;
      --bg2: #080810;
      --panel: #0a0a12;
      --panel2: #0f0f1a;
      --border: #1a1a2e;
      --border2: #252540;
      --cyan: #00f5ff;
      --purple2: #a855f7;
      --green: #00ff88;
      --red: #ff3366;
      --yellow: #ffcc00;
      --text: #c8d6e5;
      --text2: #8899aa;
      --dim: #445566;
      --glow-c: 0 0 20px rgba(0,245,255,0.4);
      --glow-g: 0 0 20px rgba(0,255,136,0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Exo 2', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(0,245,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(124,58,237,0.05) 0%, transparent 60%);
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px);
      pointer-events: none; z-index: 9999;
    }

    /* SIDEBAR */
    #sidebar {
      width: 260px; min-width: 260px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      position: relative;
    }
    #sidebar::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.5;
    }
    #sidebar-top { padding: 20px 16px 12px; flex-shrink: 0; }
    .logo {
      font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 900;
      letter-spacing: 3px; padding: 0 8px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      color: var(--cyan); text-shadow: var(--glow-c);
    }
    .logo-icon {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1.5px solid var(--cyan);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; box-shadow: var(--glow-c), inset 0 0 8px rgba(0,245,255,0.1);
    }
    .new-chat-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; margin-top: 12px; padding: 10px; border-radius: 6px;
      background: transparent; border: 1px solid var(--cyan);
      color: var(--cyan); font-family: 'Orbitron', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
      cursor: pointer; transition: all 0.2s;
      text-shadow: var(--glow-c); box-shadow: 0 0 12px rgba(0,245,255,0.1);
    }
    .new-chat-btn:hover { background: rgba(0,245,255,0.08); box-shadow: var(--glow-c); }
    #sidebar-nav { padding: 8px 16px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
    .nav-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 5px; cursor: pointer;
      font-family: 'Share Tech Mono', monospace; font-size: 12px;
      color: var(--text2); background: transparent; border: none;
      width: 100%; text-align: left; transition: all 0.15s; letter-spacing: 0.5px;
    }
    .nav-btn::before { content: '// '; color: var(--border2); }
    .nav-btn:hover { background: rgba(0,245,255,0.05); color: var(--cyan); }
    .nav-btn:hover::before { color: var(--cyan); }
    .nav-btn.active { background: rgba(0,245,255,0.08); color: var(--cyan); border-left: 2px solid var(--cyan); }
    .nav-btn.active::before { color: var(--cyan); }
    #sidebar-history { flex: 1; overflow-y: auto; padding: 0 16px 16px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
    .section-label {
      font-family: 'Orbitron', monospace; font-size: 8px; font-weight: 700;
      letter-spacing: 3px; color: var(--dim); padding: 14px 8px 8px; text-transform: uppercase;
    }
    .chat-history-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 5px;
      cursor: pointer; margin-bottom: 2px;
      transition: all 0.15s; border: 1px solid transparent;
    }
    .chat-history-item:hover { background: rgba(0,245,255,0.04); border-color: var(--border); }
    .chat-history-item.active-session { background: rgba(0,245,255,0.07); border-color: rgba(0,245,255,0.3); }
    .chat-history-title {
      flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 11px;
      color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
    }
    .chat-history-item:hover .chat-history-title,
    .chat-history-item.active-session .chat-history-title { color: var(--cyan); }
    .chat-history-date { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--dim); flex-shrink: 0; }
    .delete-session-btn {
      background: none; border: none; color: var(--dim);
      cursor: pointer; font-size: 11px; padding: 2px 4px;
      opacity: 0; flex-shrink: 0; border-radius: 3px; transition: opacity 0.15s;
    }
    .chat-history-item:hover .delete-session-btn { opacity: 1; }
    .delete-session-btn:hover { color: var(--red); background: rgba(255,51,102,0.1); }

    /* MAIN */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .view { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .view.active { display: flex; }

    /* CHAT HEADER */
    #chat-header {
      padding: 16px 28px 14px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: var(--bg1); position: relative;
    }
    #chat-header::after {
      content: ''; position: absolute; bottom: 0; left: 28px; right: 28px;
      height: 1px; background: linear-gradient(90deg, transparent, var(--border2), transparent);
    }
    .chat-title { font-size: 14px; font-weight: 600; color: var(--text); max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-badge {
      display: flex; align-items: center; gap: 8px;
      font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text2);
      border: 1px solid var(--border2); padding: 4px 10px; border-radius: 20px; background: var(--panel);
    }
    .pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); box-shadow: var(--glow-g); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(0,255,136,0.5); } 50% { opacity:0.8; box-shadow:0 0 0 4px rgba(0,255,136,0); } }

    /* MESSAGES */
    #messages {
      flex: 1; overflow-y: auto; padding: 24px 28px;
      display: flex; flex-direction: column; gap: 18px;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
      background: var(--bg);
    }
    .message { display: flex; gap: 12px; max-width: 820px; }
    .message.user { flex-direction: row-reverse; align-self: flex-end; }
    .avatar {
      width: 32px; height: 32px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700; flex-shrink: 0;
    }
    .avatar.ai { background: rgba(0,245,255,0.08); border: 1px solid rgba(0,245,255,0.3); color: var(--cyan); box-shadow: 0 0 10px rgba(0,245,255,0.15); }
    .avatar.user { background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3); color: var(--purple2); }
    .bubble { padding: 12px 16px; border-radius: 8px; font-size: 13.5px; line-height: 1.7; max-width: 660px; }
    .message.ai .bubble { background: var(--panel); border: 1px solid var(--border2); border-top-left-radius: 2px; color: var(--text); }
    .message.user .bubble { background: rgba(124,58,237,0.12); border: 1px solid rgba(124,58,237,0.35); border-top-right-radius: 2px; color: var(--text); }
    .bubble h1 { font-family: 'Orbitron', monospace; font-size: 14px; color: var(--cyan); margin: 12px 0 6px; letter-spacing: 1px; }
    .bubble h2 { font-family: 'Orbitron', monospace; font-size: 13px; color: var(--cyan); margin: 12px 0 6px; }
    .bubble h3 { font-size: 13px; margin: 10px 0 5px; font-weight: 700; color: var(--purple2); }
    .bubble p { margin-bottom: 8px; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 8px; }
    .bubble li { margin-bottom: 4px; }
    .bubble code { background: rgba(0,245,255,0.08); padding: 1px 6px; border-radius: 3px; font-family: 'Share Tech Mono', monospace; font-size: 12px; color: var(--cyan); border: 1px solid rgba(0,245,255,0.15); }
    .bubble pre { background: rgba(0,0,0,0.6); padding: 12px; border-radius: 6px; overflow-x: auto; font-family: 'Share Tech Mono', monospace; font-size: 12px; margin: 8px 0; border: 1px solid var(--border2); border-left: 2px solid var(--cyan); }
    .bubble pre code { background: none; padding: 0; color: var(--green); border: none; }
    .bubble strong { color: var(--cyan); font-weight: 700; }
    .bubble em { color: var(--purple2); }
    .bubble hr { border: none; border-top: 1px solid var(--border2); margin: 10px 0; }
    .msg-time { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--dim); margin-top: 4px; padding: 0 4px; }
    .message.user .msg-time { text-align: right; }
    .thinking { display: flex; gap: 5px; align-items: center; padding: 12px 16px; }
    .thinking span { width: 5px; height: 5px; border-radius: 50%; background: var(--cyan); opacity: 0.4; animation: bounce 1.2s infinite; box-shadow: var(--glow-c); }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0); opacity:0.4; } 40% { transform:translateY(-6px); opacity:1; } }

    /* INPUT */
    #input-area { padding: 10px 28px 22px; border-top: 1px solid var(--border); flex-shrink: 0; background: var(--bg1); }
    #file-preview {
      display: none; align-items: center; gap: 10px;
      padding: 8px 12px; margin-bottom: 6px;
      background: rgba(0,245,255,0.05); border: 1px solid rgba(0,245,255,0.2);
      border-radius: 8px;
    }
    #file-preview.show { display: flex; }
    #file-preview-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border2); display: none; }
    #file-preview-thumb.show { display: block; }
    #file-preview-icon { font-size: 22px; display: none; }
    #file-preview-icon.show { display: block; }
    #file-preview-name { flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #file-preview-size { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); flex-shrink: 0; }
    #file-remove-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 3px; transition: all 0.15s; flex-shrink: 0; }
    #file-remove-btn:hover { color: var(--red); background: rgba(255,51,102,0.1); }
    #input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--panel); border: 1px solid var(--border2);
      border-radius: 8px; padding: 10px 12px; transition: border-color 0.2s, box-shadow 0.2s;
    }
    #input-row:focus-within { border-color: rgba(0,245,255,0.4); box-shadow: 0 0 20px rgba(0,245,255,0.08); }
    #chat-input { flex: 1; background: none; border: none; outline: none; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--text); resize: none; max-height: 120px; line-height: 1.5; }
    #chat-input::placeholder { color: var(--dim); }
    #attach-btn {
      width: 32px; height: 32px; border-radius: 6px;
      background: transparent; border: 1px solid var(--border2);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text2); font-size: 15px; flex-shrink: 0; transition: all 0.2s;
    }
    #attach-btn:hover { border-color: var(--cyan); color: var(--cyan); box-shadow: 0 0 10px rgba(0,245,255,0.15); }
    #attach-btn.has-file { border-color: var(--cyan); color: var(--cyan); background: rgba(0,245,255,0.08); }
    #file-input { display: none; }
    #send-btn {
      width: 32px; height: 32px; border-radius: 6px;
      background: rgba(0,245,255,0.1); border: 1px solid rgba(0,245,255,0.3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--cyan); font-size: 14px; flex-shrink: 0; transition: all 0.2s;
    }
    #send-btn:hover { background: rgba(0,245,255,0.2); box-shadow: var(--glow-c); }
    #send-btn:active { transform: scale(0.95); }

    /* VOICE */
    #mic-btn {
      width: 32px; height: 32px; border-radius: 6px;
      background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.3);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--purple2); font-size: 15px; flex-shrink: 0; transition: all 0.2s;
    }
    #mic-btn:hover { background: rgba(168,85,247,0.2); box-shadow: 0 0 16px rgba(168,85,247,0.4); }
    #mic-btn.listening {
      background: rgba(255,51,102,0.15); border-color: var(--red); color: var(--red);
      box-shadow: 0 0 16px rgba(255,51,102,0.5); animation: mic-pulse 1s infinite;
    }
    @keyframes mic-pulse { 0%,100% { box-shadow: 0 0 8px rgba(255,51,102,0.4); } 50% { box-shadow: 0 0 28px rgba(255,51,102,0.9); } }
    #voice-toggle {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      color: var(--dim); cursor: pointer;
      border: 1px solid var(--border2); padding: 4px 10px; border-radius: 20px;
      background: var(--panel); transition: all 0.2s; user-select: none;
    }
    #voice-toggle.active { color: var(--green); border-color: rgba(0,255,136,0.4); box-shadow: var(--glow-g); }
    #voice-toggle .vdot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); transition: all 0.2s; flex-shrink:0; }
    #voice-toggle.active .vdot { background: var(--green); box-shadow: var(--glow-g); }
    #voice-status { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--red); padding: 3px 12px; text-align: center; display: none; letter-spacing: 1px; }
    #voice-status.show { display: block; }
    .avatar.ai.speaking { animation: speaking-glow 0.5s infinite alternate; }
    @keyframes speaking-glow { from { box-shadow: 0 0 10px rgba(0,245,255,0.3); } to { box-shadow: 0 0 30px rgba(0,245,255,0.9), 0 0 60px rgba(0,245,255,0.3); } }

    /* PAGE TITLES */
    .page-title { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900; letter-spacing: 3px; margin-bottom: 6px; color: var(--cyan); text-shadow: var(--glow-c); }
    .page-sub { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--dim); margin-bottom: 24px; }

    /* BRIEFING */
    #briefing-content { flex: 1; overflow-y: auto; padding: 32px; }
    .briefing-box { background: var(--panel); border: 1px solid var(--border2); border-top: 2px solid var(--cyan); border-radius: 10px; padding: 28px 32px; max-width: 720px; font-size: 14px; line-height: 1.8; }
    .briefing-box h2 { font-family: 'Orbitron', monospace; font-size: 13px; color: var(--cyan); margin: 16px 0 6px; }
    .briefing-box h3 { font-size: 13px; margin: 14px 0 5px; color: var(--purple2); }
    .briefing-box p { margin-bottom: 10px; color: var(--text2); }
    .briefing-box ul { padding-left: 20px; margin-bottom: 10px; }
    .briefing-box li { margin-bottom: 6px; color: var(--text2); }
    .briefing-box strong { color: var(--cyan); }
    .action-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; color: var(--cyan); border: 1px solid var(--cyan);
      padding: 10px 20px; border-radius: 6px;
      font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px;
      cursor: pointer; margin-bottom: 24px; transition: all 0.2s;
      text-shadow: var(--glow-c); box-shadow: 0 0 10px rgba(0,245,255,0.1);
    }
    .action-btn:hover { background: rgba(0,245,255,0.1); box-shadow: var(--glow-c); }

    /* TASKS */
    #tasks-content { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .tasks-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    #add-task-btn {
      background: transparent; color: var(--green); border: 1px solid var(--green);
      padding: 8px 16px; border-radius: 5px;
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      cursor: pointer; transition: all 0.2s;
    }
    #add-task-btn:hover { background: rgba(0,255,136,0.08); box-shadow: var(--glow-g); }
    .task-card { display: flex; align-items: center; gap: 14px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; transition: all 0.2s; }
    .task-card:hover { border-color: var(--border2); background: var(--panel2); }
    .task-card.done { opacity: 0.4; }
    .task-checkbox { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 10px; }
    .task-checkbox.checked { background: var(--green); border-color: var(--green); color: #000; box-shadow: var(--glow-g); }
    .task-info { flex: 1; }
    .task-title-text { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .task-card.done .task-title-text { text-decoration: line-through; }
    .task-meta { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); display: flex; gap: 10px; flex-wrap: wrap; }
    .priority-tag { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .p-high-tag { background: rgba(255,51,102,0.12); color: var(--red); border: 1px solid rgba(255,51,102,0.25); }
    .p-medium-tag { background: rgba(255,204,0,0.12); color: var(--yellow); border: 1px solid rgba(255,204,0,0.25); }
    .p-low-tag { background: rgba(0,255,136,0.12); color: var(--green); border: 1px solid rgba(0,255,136,0.25); }
    .delete-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 4px; opacity: 0; transition: opacity 0.2s; }
    .task-card:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--red); }

    /* MODAL */
    #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 100; align-items: center; justify-content: center; }
    #modal-overlay.open { display: flex; }
    #modal { background: var(--panel2); border: 1px solid var(--border2); border-top: 2px solid var(--cyan); border-radius: 10px; padding: 28px; width: 400px; box-shadow: 0 0 60px rgba(0,245,255,0.08); }
    .modal-title { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; color: var(--cyan); margin-bottom: 20px; letter-spacing: 2px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .field input, .field select, .field textarea { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--cyan); box-shadow: 0 0 8px rgba(0,245,255,0.1); }
    .field select option { background: var(--panel2); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .btn-cancel { padding: 8px 16px; border-radius: 5px; border: 1px solid var(--border2); background: none; color: var(--text2); cursor: pointer; font-family: 'Share Tech Mono', monospace; font-size: 12px; }
    .btn-save { padding: 8px 20px; border-radius: 5px; border: 1px solid var(--cyan); background: rgba(0,245,255,0.1); color: var(--cyan); cursor: pointer; font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; letter-spacing: 1px; }
    .btn-save:hover { background: rgba(0,245,255,0.2); }

    /* PROFILE */
    #profile-content { flex: 1; overflow-y: auto; padding: 28px 32px; }
    .profile-section { background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 20px 24px; margin-bottom: 14px; max-width: 700px; transition: border-color 0.2s; }
    .profile-section:hover { border-color: var(--border2); }
    .profile-section h3 { font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700; color: var(--cyan); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 2px; }
    .profile-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .profile-field { flex: 1; }
    .profile-field label { display: block; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); margin-bottom: 5px; }
    .profile-field input, .profile-field textarea { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 12px; outline: none; transition: border-color 0.2s; }
    .profile-field input:focus, .profile-field textarea:focus { border-color: var(--cyan); }
    .save-profile-btn { background: transparent; color: var(--cyan); border: 1px solid var(--cyan); padding: 10px 24px; border-radius: 6px; font-family: 'Orbitron', monospace; font-size: 10px; font-weight: 700; letter-spacing: 2px; cursor: pointer; margin-top: 8px; transition: all 0.2s; }
    .save-profile-btn:hover { background: rgba(0,245,255,0.1); box-shadow: var(--glow-c); }

    .empty-history { padding: 16px 8px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--dim); text-align: center; }
    #toast { position: fixed; bottom: 28px; right: 28px; background: var(--panel2); border: 1px solid var(--cyan); padding: 10px 18px; border-radius: 6px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none; z-index: 200; box-shadow: var(--glow-c); }
    #toast.show { opacity: 1; transform: translateY(0); }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    /* VOICE OVERLAY */
    #voice-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: #000;
      align-items: center; justify-content: center; flex-direction: column;
    }
    #voice-overlay.open { display: flex; }
    #globe-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #voice-close {
      position: absolute; top: 24px; right: 28px;
      background: transparent; border: 1px solid var(--border2);
      color: var(--text2); font-family: 'Orbitron', monospace;
      font-size: 10px; letter-spacing: 2px; padding: 8px 16px;
      border-radius: 5px; cursor: pointer; z-index: 10; transition: all 0.2s;
    }
    #voice-close:hover { border-color: var(--red); color: var(--red); }
    #voice-ui {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      pointer-events: none;
    }
    #voice-label {
      font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900;
      letter-spacing: 8px; color: var(--cyan);
      text-shadow: 0 0 30px rgba(0,245,255,0.8), 0 0 60px rgba(0,245,255,0.3);
    }
    #voice-state-text {
      font-family: 'Share Tech Mono', monospace; font-size: 13px;
      letter-spacing: 3px; color: var(--text2);
      transition: color 0.3s;
    }
    #voice-state-text.listening { color: var(--green); text-shadow: 0 0 10px rgba(0,255,136,0.6); }
    #voice-state-text.speaking { color: var(--cyan); text-shadow: 0 0 10px rgba(0,245,255,0.6); }
    #voice-state-text.processing { color: var(--yellow); text-shadow: 0 0 10px rgba(255,204,0,0.5); }
    #voice-transcript {
      font-family: 'Share Tech Mono', monospace; font-size: 12px;
      color: var(--text2); max-width: 500px; text-align: center;
      line-height: 1.6; min-height: 40px; transition: opacity 0.3s;
      padding: 0 20px;
    }
    #voice-activate-btn {
      position: absolute; bottom: 48px;
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(0,245,255,0.08);
      border: 1.5px solid rgba(0,245,255,0.4);
      color: var(--cyan); cursor: pointer; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s; box-shadow: 0 0 20px rgba(0,245,255,0.15);
    }
    #voice-activate-btn:hover { background: rgba(0,245,255,0.15); box-shadow: var(--glow-c); }
    #voice-activate-btn.active {
      background: rgba(255,51,102,0.15); border-color: var(--red);
      color: var(--red); box-shadow: 0 0 24px rgba(255,51,102,0.5);
      animation: mic-pulse 1s infinite;
    }
    /* voice launch btn in header */
    #open-voice-btn {
      display: flex; align-items: center; gap: 6px;
      font-family: 'Share Tech Mono', monospace; font-size: 10px;
      color: var(--purple2); cursor: pointer;
      border: 1px solid rgba(168,85,247,0.35); padding: 4px 10px;
      border-radius: 20px; background: rgba(168,85,247,0.08);
      transition: all 0.2s; user-select: none; letter-spacing: 1px;
    }
    #open-voice-btn:hover { background: rgba(168,85,247,0.15); box-shadow: 0 0 16px rgba(168,85,247,0.3); }
  </style>
</head>

<main id="main">
  <div class="view active" id="view-chat">

    <div id="input-area">

        <span id="file-preview-icon"></span>
        <span id="file-preview-name"></span>

        <div class="profile-row"><div class="profile-field"><label>Skills</label><input id="p-skills" type="text" placeholder="e.g. Python, React, JavaScript" /></div></div>

  </div>
  <button id="voice-activate-btn" onclick="startVoiceConversation()">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect x="10" y="2" width="8" height="16" rx="4" fill="currentColor"/>
      <path d="M5 14a9 9 0 0018 0" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
      <line x1="14" y1="23" x2="14" y2="26" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>

<script>
  const API = 'http://localhost:8000';
  let currentSessionId = localStorage.getItem('currentSessionId') || generateSessionId();
  let isLoading = false;
  const sessionMap = {};

  function generateSessionId() {
    const id = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    localStorage.setItem('currentSessionId', id);
    return id;
  }

  function newChat() {
    currentSessionId = generateSessionId();
    localStorage.setItem('currentSessionId', currentSessionId);
    document.getElementById('messages').innerHTML = '';
    document.getElementById('current-chat-title').textContent = 'New Chat';
    showView('chat', null);
    addWelcomeMessage();
    loadChatHistory();
  }

  function addWelcomeMessage() {
    addMessage('ai', "System online. I'm your personal AI — I remember everything.\n\nWhat do you need?");
  }

  // BUG FIX: Use DOM-built elements + event listeners instead of inline onclick with title strings
  async function loadSession(sessionId) {
    currentSessionId = sessionId;
    localStorage.setItem('currentSessionId', sessionId);
    const title = sessionMap[sessionId] || 'Chat';
    document.getElementById('messages').innerHTML = '';
    document.getElementById('current-chat-title').textContent = title;
    document.querySelectorAll('.chat-history-item').forEach(el => el.classList.remove('active-session'));
    const activeEl = document.querySelector('[data-session="' + sessionId + '"]');
    if (activeEl) activeEl.classList.add('active-session');
    showView('chat', null);
    try {
      const res = await fetch(API + '/api/sessions/' + encodeURIComponent(sessionId));
      const data = await res.json();
      const msgs = data.messages || [];
      if (msgs.length === 0) { addWelcomeMessage(); return; }
      msgs.forEach(msg => addMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    } catch(e) { addWelcomeMessage(); }
  }

  async function loadChatHistory() {
    try {
      const res = await fetch(API + '/api/sessions');
      const data = await res.json();
      const sessions = data.sessions || [];
      const container = document.getElementById('chat-history-list');
      if (sessions.length === 0) {
        container.innerHTML = '<div class="empty-history">// no sessions found</div>';
        return;
      }
      container.innerHTML = '';
      sessions.forEach(s => {
        sessionMap[s.session_id] = s.title;
        const div = document.createElement('div');
        div.className = 'chat-history-item' + (s.session_id === currentSessionId ? ' active-session' : '');
        div.dataset.session = s.session_id;

        const inner = document.createElement('div');
        inner.style.cssText = 'flex:1;min-width:0;';

        const t = document.createElement('div');
        t.className = 'chat-history-title';
        t.textContent = s.title;

        const d = document.createElement('div');
        d.className = 'chat-history-date';
        d.textContent = formatDate(s.updated_at) + ' · ' + s.message_count + ' msgs';

        const del = document.createElement('button');
        del.className = 'delete-session-btn';
        del.textContent = '✕';
        del.addEventListener('click', e => { e.stopPropagation(); deleteSession(s.session_id); });

        inner.appendChild(t);
        inner.appendChild(d);
        div.appendChild(inner);
        div.appendChild(del);
        div.addEventListener('click', () => loadSession(s.session_id));
        container.appendChild(div);
      });
    } catch(e) {}
  }

  async function deleteSession(sessionId) {
    await fetch(API + '/api/sessions/' + encodeURIComponent(sessionId), { method: 'DELETE' });
    if (sessionId === currentSessionId) newChat();
    else loadChatHistory();
    toast('Session deleted');
  }

  function formatDate(iso) {
    if (!iso) return '';
    const d = new Date(iso), now = new Date(), diff = now - d;
    if (diff < 86400000) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (diff < 604800000) return d.toLocaleDateString([], { weekday: 'short' });
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  function addMessage(role, content, scroll = true) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ' + (role === 'user' ? 'user' : 'ai');
    const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    div.innerHTML =
      '<div class="avatar ' + (role === 'user' ? 'user' : 'ai') + '">' + (role === 'ai' ? 'AI' : 'YOU') + '</div>' +
      '<div><div class="bubble">' + (role === 'ai' ? renderMarkdown(content) : escapeHtml(content)) + '</div>' +
      '<div class="msg-time">' + time + '</div></div>';
    msgs.appendChild(div);
    if (scroll) msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function addThinking() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ai'; div.id = 'thinking-bubble';
    div.innerHTML = '<div class="avatar ai">AI</div><div class="bubble"><div class="thinking"><span></span><span></span><span></span></div></div>';
    msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  }
  function removeThinking() { const el = document.getElementById('thinking-bubble'); if (el) el.remove(); }

  // ── FILE HANDLING ─────────────────────────────────────────
  let attachedFile = null; // { data: base64, type, name, size }

  const FILE_ICONS = {
    pdf: '📄', txt: '📝', md: '📝', doc: '📃', docx: '📃', csv: '📊',
    jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', webp: '🖼'
  };

  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    const ext = file.name.split('.').pop().toLowerCase();
    const isImage = ['jpg','jpeg','png','gif','webp'].includes(ext);
    const maxSize = isImage ? 10 * 1024 * 1024 : 20 * 1024 * 1024;

    if (file.size > maxSize) {
      toast('File too large (max ' + (maxSize / 1024 / 1024) + 'MB)');
      event.target.value = '';
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      const base64 = e.target.result.split(',')[1];
      let fileType = 'text';
      if (isImage) fileType = 'image';
      else if (ext === 'pdf') fileType = 'pdf';
      else if (ext === 'docx' || ext === 'doc') fileType = 'docx';
      else if (ext === 'csv') fileType = 'csv';

      attachedFile = { data: base64, type: fileType, name: file.name, size: file.size, ext };

      // Show preview
      const preview = document.getElementById('file-preview');
      const thumb = document.getElementById('file-preview-thumb');
      const icon = document.getElementById('file-preview-icon');
      const nameEl = document.getElementById('file-preview-name');
      const sizeEl = document.getElementById('file-preview-size');
      const attachBtn = document.getElementById('attach-btn');

      nameEl.textContent = file.name;
      sizeEl.textContent = (file.size / 1024).toFixed(0) + ' KB';

      if (isImage) {
        thumb.src = e.target.result;
        thumb.classList.add('show');
        icon.classList.remove('show');
      } else {
        icon.textContent = FILE_ICONS[ext] || '📎';
        icon.classList.add('show');
        thumb.classList.remove('show');
      }

      preview.classList.add('show');
      attachBtn.classList.add('has-file');
      document.getElementById('chat-input').placeholder = '> ask about this file... (or just send to analyze)';
    };
    reader.readAsDataURL(file);
    event.target.value = '';
  }

  function removeFile() {
    attachedFile = null;
    document.getElementById('file-preview').classList.remove('show');
    document.getElementById('file-preview-thumb').classList.remove('show');
    document.getElementById('file-preview-icon').classList.remove('show');
    document.getElementById('attach-btn').classList.remove('has-file');
    document.getElementById('chat-input').placeholder = '> enter query...';
  }

  // ── SEND MESSAGE ──────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg && !attachedFile) return;
    if (isLoading) return;
    input.value = ''; input.style.height = 'auto';
    isLoading = true;

    const title = document.getElementById('current-chat-title');
    const displayMsg = msg || (attachedFile ? 'Analyze: ' + attachedFile.name : '');
    if (title.textContent === 'New Chat') title.textContent = displayMsg.substring(0, 50) + (displayMsg.length > 50 ? '...' : '');

    // Show user message with file preview if attached
    if (attachedFile && attachedFile.type === 'image') {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'message user';
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = '<div class="avatar user">YOU</div><div>' +
        '<div class="bubble"><img src="data:image/' + attachedFile.ext + ';base64,' + attachedFile.data +
        '" style="max-width:240px;max-height:200px;border-radius:6px;display:block;margin-bottom:' + (msg ? '8px' : '0') + '" />' +
        (msg ? escapeHtml(msg) : '') + '</div>' +
        '<div class="msg-time">' + time + '</div></div>';
      msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
    } else if (attachedFile) {
      addMessage('user', (FILE_ICONS[attachedFile.ext] || '📎') + ' ' + attachedFile.name + (msg ? '\n' + msg : ''));
    } else {
      addMessage('user', msg);
    }

    addThinking();
    showView('chat', null);

    const payload = {
      message: msg || 'Analyze this file and give me a detailed summary.',
      session_id: currentSessionId
    };
    if (attachedFile) {
      payload.file_data = attachedFile.data;
      payload.file_type = attachedFile.type;
      payload.file_name = attachedFile.name;
    }

    const fileRef = attachedFile;
    removeFile();

    try {
      const res = await fetch(API + '/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      removeThinking(); addMessage('ai', data.response); loadChatHistory();
    } catch(e) {
      removeThinking();
      addMessage('ai', 'Backend offline. Start server on port 8000.');
    }
    isLoading = false;
  }

  document.getElementById('chat-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function showView(name, btnEl) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    if (btnEl) btnEl.classList.add('active');
    if (name === 'tasks') loadTasks();
    if (name === 'profile') loadProfile();
    if (name === 'briefing') {
      document.getElementById('brief-date').textContent = '> ' + new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    }
  }

  async function loadBriefing() {
    const box = document.getElementById('briefing-box');
    box.style.display = 'block';
    box.innerHTML = '<div class="thinking" style="padding:20px 0"><span></span><span></span><span></span></div>';
    try {
      const res = await fetch(API + '/api/briefing');
      const data = await res.json();
      box.innerHTML = renderMarkdown(data.briefing);
    } catch { box.innerHTML = 'Could not load briefing.'; }
  }

  async function loadTasks() {
    const res = await fetch(API + '/api/tasks').catch(() => null);
    if (!res) return;
    const data = await res.json();
    const list = document.getElementById('task-list');
    const tasks = data.tasks || [];
    if (!tasks.length) { list.innerHTML = '<div style="color:var(--dim);font-family:Share Tech Mono,monospace;font-size:12px;padding:20px 0">// no tasks found</div>'; return; }
    list.innerHTML = tasks.map(t =>
      '<div class="task-card ' + (t.done ? 'done' : '') + '">' +
      '<div class="task-checkbox ' + (t.done ? 'checked' : '') + '" onclick="toggleTask(\'' + t.id + '\',' + t.done + ')">' + (t.done ? '&#10003;' : '') + '</div>' +
      '<div class="task-info"><div class="task-title-text">' + escapeHtml(t.title) + '</div>' +
      '<div class="task-meta"><span class="priority-tag p-' + t.priority + '-tag">' + t.priority + '</span>' +
      (t.due ? '<span>DUE: ' + t.due + '</span>' : '') +
      (t.notes ? '<span>' + escapeHtml(t.notes.substring(0,40)) + '</span>' : '') + '</div></div>' +
      '<button class="delete-btn" onclick="deleteTask(\'' + t.id + '\')">&#x2715;</button></div>'
    ).join('');
  }

  async function toggleTask(id, wasDone) {
    if (!wasDone) { await fetch(API + '/api/tasks/' + id + '/done', { method: 'PUT' }); toast('Task complete'); }
    loadTasks();
  }
  async function deleteTask(id) { await fetch(API + '/api/tasks/' + id, { method: 'DELETE' }); loadTasks(); }
  function openModal() { document.getElementById('modal-overlay').classList.add('open'); }
  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
  async function saveTask() {
    const title = document.getElementById('t-title').value.trim();
    if (!title) return;
    await fetch(API + '/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, priority: document.getElementById('t-priority').value, due: document.getElementById('t-due').value || null, notes: document.getElementById('t-notes').value || null }) });
    closeModal(); document.getElementById('t-title').value = ''; document.getElementById('t-notes').value = '';
    loadTasks(); toast('Task added');
  }

  async function loadProfile() {
    const res = await fetch(API + '/api/profile').catch(() => null);
    if (!res) return;
    const p = await res.json();
    document.getElementById('p-name').value = p.name || '';
    document.getElementById('p-role').value = p.role || '';
    document.getElementById('p-timezone').value = p.timezone || '';
    document.getElementById('p-workstyle').value = p.work_style || '';
    document.getElementById('p-about').value = p.about || '';
    document.getElementById('p-projects').value = (p.current_projects || []).join(', ');
    document.getElementById('p-skills').value = (p.skills || []).join(', ');
    document.getElementById('p-goals').value = (p.goals || []).join('\n');
    document.getElementById('p-notes').value = p.notes || '';
  }
  async function saveProfile() {
    const data = { name: document.getElementById('p-name').value, role: document.getElementById('p-role').value, timezone: document.getElementById('p-timezone').value, work_style: document.getElementById('p-workstyle').value, about: document.getElementById('p-about').value, current_projects: document.getElementById('p-projects').value.split(',').map(s=>s.trim()).filter(Boolean), skills: document.getElementById('p-skills').value.split(',').map(s=>s.trim()).filter(Boolean), goals: document.getElementById('p-goals').value.split('\n').map(s=>s.trim()).filter(Boolean), notes: document.getElementById('p-notes').value };
    await fetch(API + '/api/profile', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ data }) });
    toast('Profile saved');
  }

  function renderMarkdown(text) {
    return text
      .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^---$/gm, '<hr>')
      .replace(/^\- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
      .split('\n\n').map(p => p.startsWith('<') ? p : '<p>' + p + '</p>').join('');
  }
  function escapeHtml(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = '> ' + msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  window.addEventListener('load', async () => {
    const saved = localStorage.getItem('currentSessionId');
    if (saved) {
      currentSessionId = saved;
      try {
        const res = await fetch(API + '/api/sessions/' + encodeURIComponent(saved));
        const data = await res.json();
        if (data.messages && data.messages.length > 0) {
          data.messages.forEach(msg => addMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
          document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
          const first = data.messages.find(m => m.role === 'user');
          if (first) document.getElementById('current-chat-title').textContent = first.content.substring(0, 50);
        } else { addWelcomeMessage(); }
      } catch(e) { addWelcomeMessage(); }
    } else { addWelcomeMessage(); }
    loadChatHistory();
  });

  // ══════════════════════════════════════════════════════════
  // VOICE MODE — Full-duplex conversation + Particle Globe
  // ══════════════════════════════════════════════════════════
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  // State: idle | listening | processing | speaking
  let vState = 'idle';
  let vMicStream = null;
  let vAudioCtx = null;
  let vAnalyser = null;
  let vDataArr = null;
  let vSilenceTimer = null;
  let vSpeechDetected = false;
  let vRecognition = null;
  let vCurrentUtterance = null;
  let vGlobeRAF = null;
  let vAudioLevel = 0;       // 0–1 amplitude driving globe
  let vTargetLevel = 0;

  // Globe particles
  const PARTICLES = 600;
  const particles = [];

  function openVoiceMode() {
    document.getElementById('voice-overlay').classList.add('open');
    initGlobe();
    setVoiceState('idle');
  }

  function exitVoiceMode() {
    stopVoiceConversation();
    document.getElementById('voice-overlay').classList.remove('open');
    if (vGlobeRAF) { cancelAnimationFrame(vGlobeRAF); vGlobeRAF = null; }
  }

  function setVoiceState(state) {
    vState = state;
    const stateEl = document.getElementById('voice-state-text');
    const btn = document.getElementById('voice-activate-btn');
    stateEl.className = state;
    const labels = { idle: 'TAP TO SPEAK', listening: 'LISTENING...', processing: 'THINKING...', speaking: 'SPEAKING' };
    stateEl.textContent = labels[state] || state.toUpperCase();
    btn.classList.toggle('active', state === 'listening');
  }

  function setTranscript(text) {
    document.getElementById('voice-transcript').textContent = text;
  }

  // ── Start/Stop conversation ──────────────────────────────
  async function startVoiceConversation() {
    if (vState === 'listening') { stopListeningVoice(); return; }
    if (vState !== 'idle') return;
    // Request mic
    try {
      vMicStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch(e) { toast('Mic permission denied'); return; }

    // Setup AudioContext for VAD
    vAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = vAudioCtx.createMediaStreamSource(vMicStream);
    vAnalyser = vAudioCtx.createAnalyser();
    vAnalyser.fftSize = 512;
    vAnalyser.smoothingTimeConstant = 0.7;
    source.connect(vAnalyser);
    vDataArr = new Uint8Array(vAnalyser.frequencyBinCount);

    await calibrateNoise();
    startListeningVoice();
  }

  function stopVoiceConversation() {
    stopListeningVoice();
    window.speechSynthesis.cancel();
    if (vMicStream) { vMicStream.getTracks().forEach(t => t.stop()); vMicStream = null; }
    if (vAudioCtx) { vAudioCtx.close(); vAudioCtx = null; }
    clearTimeout(vSilenceTimer);
    setVoiceState('idle');
    setTranscript('');
  }

  // ── Noise-calibrated VAD ─────────────────────────────────
  let vNoiseFloor = 10;      // calibrated ambient noise level
  let vSpeaking = false;
  let vSpeakStart = 0;
  let vSilenceStart = 0;
  const VAD_THRESHOLD_ABOVE = 12;   // dB above noise floor to count as speech
  const VAD_SILENCE_MS = 1200;      // ms of silence before we cut
  const VAD_MIN_SPEECH_MS = 400;    // minimum speech duration to count
  let vVADLoop = null;
  let vMediaRecorder = null;
  let vAudioChunks = [];

  async function calibrateNoise() {
    if (!vAnalyser || !vDataArr) return;
    setTranscript('Calibrating...');
    // Sample noise for 800ms
    const samples = [];
    for (let i = 0; i < 16; i++) {
      await new Promise(r => setTimeout(r, 50));
      vAnalyser.getByteFrequencyData(vDataArr);
      let sum = 0;
      for (let j = 0; j < vDataArr.length; j++) sum += vDataArr[j];
      samples.push(sum / vDataArr.length);
    }
    vNoiseFloor = Math.max(5, samples.reduce((a,b) => a+b,0) / samples.length);
    setTranscript('');
  }

  function getAudioEnergy() {
    if (!vAnalyser || !vDataArr) return 0;
    vAnalyser.getByteFrequencyData(vDataArr);
    let sum = 0;
    for (let i = 0; i < vDataArr.length; i++) sum += vDataArr[i];
    return sum / vDataArr.length;
  }

  function startListeningVoice() {
    if (!SR) { toast('Speech recognition not supported'); return; }
    window.speechSynthesis.cancel();
    setVoiceState('listening');
    setTranscript('');
    vSpeaking = false;

    let bestTranscript = '';
    let handled = false;

    function runRecognition() {
      if (handled || vState !== 'listening') return;
      bestTranscript = '';

      vRecognition = new SR();
      vRecognition.continuous = false;
      vRecognition.interimResults = true;
      vRecognition.lang = 'en-US';
      vRecognition.maxAlternatives = 1;

      vRecognition.onresult = (e) => {
        let interim = '', final = '';
        for (let i = 0; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) final += t;
          else interim += t;
        }
        bestTranscript = final || interim;
        setTranscript(bestTranscript);
      };

      vRecognition.onend = () => {
        if (handled || vState !== 'listening') return;
        if (bestTranscript.trim().length > 1) {
          handled = true;
          stopVAD();
          handleVoiceInput(bestTranscript.trim());
        } else {
          // No useful speech — restart
          setTimeout(() => { if (!handled && vState === 'listening') runRecognition(); }, 200);
        }
      };

      vRecognition.onerror = (e) => {
        if (e.error === 'aborted') return;
        if (e.error === 'no-speech') {
          setTimeout(() => { if (!handled && vState === 'listening') runRecognition(); }, 200);
          return;
        }
        console.warn('SR error:', e.error);
      };

      try { vRecognition.start(); } catch(e) {
        setTimeout(() => { if (!handled && vState === 'listening') runRecognition(); }, 300);
      }
    }

    // VAD: wait for user to speak above noise floor, THEN start recognition
    function vadWait() {
      if (handled || vState !== 'listening') return;
      const energy = getAudioEnergy();
      const aboveFloor = energy - vNoiseFloor;

      if (aboveFloor > VAD_THRESHOLD_ABOVE) {
        // Speech detected — run recognition
        runRecognition();
      } else {
        vVADLoop = setTimeout(vadWait, 80);
      }
    }

    vadWait();
  }

  function stopVAD() {
    clearTimeout(vVADLoop);
    vVADLoop = null;
  }

  function stopListeningVoice() {
    stopVAD();
    if (vRecognition) { try { vRecognition.abort(); } catch(e) {} vRecognition = null; }
    if (vState === 'listening') setVoiceState('idle');
  }

  async function handleVoiceInput(text) {
    if (!text) return;
    if (vRecognition) { try { vRecognition.abort(); } catch(e) {} vRecognition = null; }
    setVoiceState('processing');
    setTranscript(text);

    // Also add to chat log
    addMessage('user', text);

    try {
      const res = await fetch(API + '/api/chat', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: currentSessionId })
      });
      const data = await res.json();
      addMessage('ai', data.response);
      loadChatHistory();
      speakVoiceReply(data.response);
    } catch(e) {
      setTranscript('Backend offline.');
      setVoiceState('idle');
    }
  }

  function speakVoiceReply(text) {
    setVoiceState('speaking');
    window.speechSynthesis.cancel();

    const clean = text
      .replace(/```[\s\S]*?```/g, '')
      .replace(/#{1,6}\s/g, '')
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/`([^`]+)`/g, '$1')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/^[-*]\s/gm, '')
      .replace(/\n+/g, ' ')
      .trim();

    setTranscript(clean.substring(0, 120) + (clean.length > 120 ? '...' : ''));

    vCurrentUtterance = new SpeechSynthesisUtterance(clean);
    vCurrentUtterance.rate = 0.95;
    vCurrentUtterance.pitch = 0.8;
    vCurrentUtterance.volume = 1;

    // Pick deep voice
    const pickVoice = () => {
      const voices = window.speechSynthesis.getVoices();
      return voices.find(v => v.name.includes('Google UK English Male'))
        || voices.find(v => v.name.includes('Daniel'))
        || voices.find(v => /en.*(GB|AU)/.test(v.lang))
        || voices.find(v => v.lang.startsWith('en'))
        || voices[0];
    };
    const v = pickVoice();
    if (v) vCurrentUtterance.voice = v;

    vCurrentUtterance.onend = () => {
      if (vState === 'speaking') {
        setVoiceState('listening');
        setTranscript('');
        startListeningVoice();
      }
    };
    vCurrentUtterance.onerror = () => {
      setVoiceState('idle');
    };

    window.speechSynthesis.speak(vCurrentUtterance);
  }

  // ── Globe Rendering ──────────────────────────────────────
  function initGlobe() {
    const canvas = document.getElementById('globe-canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Generate Fibonacci sphere particles
    particles.length = 0;
    const golden = Math.PI * (1 + Math.sqrt(5));
    for (let i = 0; i < PARTICLES; i++) {
      const theta = Math.acos(1 - 2 * (i + 0.5) / PARTICLES);
      const phi = golden * i;
      particles.push({
        bx: Math.sin(theta) * Math.cos(phi),
        by: Math.sin(theta) * Math.sin(phi),
        bz: Math.cos(theta),
        size: Math.random() * 1.5 + 0.5,
        speed: Math.random() * 0.0008 + 0.0003,
        phase: Math.random() * Math.PI * 2,
      });
    }

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    renderGlobe();
  }

  let globeRotY = 0;
  let globeRotX = 0.3;

  function renderGlobe() {
    vGlobeRAF = requestAnimationFrame(renderGlobe);
    const canvas = document.getElementById('globe-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2;

    // Get audio level
    if (vAnalyser && vDataArr) {
      vAnalyser.getByteFrequencyData(vDataArr);
      let sum = 0;
      for (let i = 0; i < vDataArr.length; i++) sum += vDataArr[i];
      vTargetLevel = (sum / vDataArr.length) / 128;
    } else if (vState === 'speaking') {
      vTargetLevel = 0.3 + Math.sin(Date.now() * 0.004) * 0.2;
    } else {
      vTargetLevel = 0;
    }
    vAudioLevel += (vTargetLevel - vAudioLevel) * 0.1;

    // Clear
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(0, 0, W, H);

    // Rotate globe
    const rotSpeed = vState === 'speaking' ? 0.006 : vState === 'listening' ? 0.004 : 0.0015;
    globeRotY += rotSpeed;

    const baseR = Math.min(W, H) * 0.28;
    const expansion = vAudioLevel * baseR * 0.55;
    const R = baseR + expansion;

    const cosY = Math.cos(globeRotY), sinY = Math.sin(globeRotY);
    const cosX = Math.cos(globeRotX), sinX = Math.sin(globeRotX);

    // Color based on state
    let colR = 0, colG = 245, colB = 255; // cyan idle
    if (vState === 'listening') { colR = 0; colG = 255; colB = 136; }      // green
    else if (vState === 'speaking') { colR = 0; colG = 220; colB = 255; }  // bright cyan
    else if (vState === 'processing') { colR = 255; colG = 204; colB = 0;} // yellow

    // Draw connections and particles
    const projected = [];
    particles.forEach((p, i) => {
      const noise = vAudioLevel * 0.35 * Math.sin(p.phase + Date.now() * p.speed * 3);
      const scale = 1 + noise;
      const x3 = p.bx * scale, y3 = p.by * scale, z3 = p.bz * scale;

      // Rotate Y
      const rx = x3 * cosY - z3 * sinY;
      const ry = y3;
      const rz = x3 * sinY + z3 * cosY;
      // Rotate X
      const fx = rx;
      const fy = ry * cosX - rz * sinX;
      const fz = ry * sinX + rz * cosX;

      const perspective = 2.2 / (2.2 + fz);
      const sx = cx + fx * R * perspective;
      const sy = cy + fy * R * perspective;
      const depth = (fz + 1) / 2; // 0–1

      projected.push({ sx, sy, depth, perspective, p });
    });

    // Sort back to front
    projected.sort((a, b) => a.depth - b.depth);

    // Draw subtle connecting lines between nearby particles
    ctx.lineWidth = 0.3;
    for (let i = 0; i < projected.length; i += 3) {
      for (let j = i + 1; j < Math.min(i + 8, projected.length); j++) {
        const a = projected[i], b = projected[j];
        const dist = Math.hypot(a.sx - b.sx, a.sy - b.sy);
        if (dist < 45) {
          const alpha = (1 - dist / 45) * 0.15 * a.depth;
          ctx.beginPath();
          ctx.strokeStyle = `rgba(${colR},${colG},${colB},${alpha})`;
          ctx.moveTo(a.sx, a.sy);
          ctx.lineTo(b.sx, b.sy);
          ctx.stroke();
        }
      }
    }

    // Draw particles
    projected.forEach(({ sx, sy, depth, perspective, p }) => {
      const size = p.size * perspective * (1 + vAudioLevel * 1.5);
      const alpha = 0.3 + depth * 0.7;
      const glow = vAudioLevel > 0.1 ? 1.5 : 1;

      // Outer glow
      const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, size * 4 * glow);
      grad.addColorStop(0, `rgba(${colR},${colG},${colB},${alpha * 0.6})`);
      grad.addColorStop(1, `rgba(${colR},${colG},${colB},0)`);
      ctx.beginPath();
      ctx.fillStyle = grad;
      ctx.arc(sx, sy, size * 4 * glow, 0, Math.PI * 2);
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.fillStyle = `rgba(${colR},${colG},${colB},${alpha})`;
      ctx.arc(sx, sy, size, 0, Math.PI * 2);
      ctx.fill();
    });

    // Central glow pulse
    const pulseR = (80 + vAudioLevel * 120) * (vState === 'idle' ? 0.5 : 1);
    const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, pulseR);
    centerGrad.addColorStop(0, `rgba(${colR},${colG},${colB},${0.04 + vAudioLevel * 0.06})`);
    centerGrad.addColorStop(1, `rgba(${colR},${colG},${colB},0)`);
    ctx.beginPath();
    ctx.fillStyle = centerGrad;
    ctx.arc(cx, cy, pulseR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Interrupt AI speech if user starts talking
  if (SR) {
    const vadRecognition = new SR();
    vadRecognition.continuous = true;
    vadRecognition.interimResults = true;
    vadRecognition.lang = 'en-US';
    vadRecognition.onspeechstart = () => {
      if (vState === 'speaking') {
        window.speechSynthesis.cancel();
        if (vCurrentUtterance) vCurrentUtterance.onend = null;
        startListeningVoice();
      }
    };
  }
</script>
